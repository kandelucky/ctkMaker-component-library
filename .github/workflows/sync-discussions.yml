name: Sync Discussions → index.json

# Rebuilds index.json from the CTkMaker repo's "Components" Discussion
# category. Runs on a 30-min cron and on-demand. The default GITHUB_TOKEN
# from the action context can read public Discussions on another repo.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

concurrency:
  group: sync-discussions
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/sync_discussions.py

      - name: Commit & push if changed
        run: |
          if [[ -z "$(git status --porcelain index.json)" ]]; then
            echo "index.json unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: sync index.json from Discussions"
          git push
